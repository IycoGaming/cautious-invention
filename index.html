<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Digital Sanctuary Pro</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&amp;family=Space+Mono:ital,wght@0,400;0,700;1,400&amp;display=swap" rel="stylesheet"/>

<link href="style.css" rel="stylesheet"/></head>
<body>
<div id="app">
<div id="screen-wrap">
<div id="screen-content"></div>
</div>
<nav id="bottom-nav">
<button class="nav-item active" data-screen="focus" onclick="App.navigate('focus')">
<div class="nav-icon">
<svg fill="none" stroke="var(--text-3)" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24">
<circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline>
</svg>
</div>
<span class="nav-label">Focus</span>
</button>
<button class="nav-item" data-screen="tasks" onclick="App.navigate('tasks')">
<div class="nav-icon">
<svg fill="none" stroke="var(--text-3)" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24">
<polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"></path>
</svg>
</div>
<span class="nav-label">Tasks</span>
</button>
<button class="nav-item" data-screen="habits" onclick="App.navigate('habits')">
<div class="nav-icon">
<svg fill="none" stroke="var(--text-3)" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24">
<path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4-6.2-4.5L5.8 21.3l2.4-7.4L2 9.4h7.6z"></path>
</svg>
</div>
<span class="nav-label">Habits</span>
</button>
<button class="nav-item" data-screen="goals" onclick="App.navigate('goals')">
<div class="nav-icon">
<svg fill="none" stroke="var(--text-3)" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24">
<circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle>
</svg>
</div>
<span class="nav-label">Goals</span>
</button>
<button class="nav-item" data-screen="journal" onclick="App.navigate('journal')">
<div class="nav-icon">
<svg fill="none" stroke="var(--text-3)" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24">
<path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"></path><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"></path>
</svg>
</div>
<span class="nav-label">Journal</span>
</button>
<button class="nav-item" data-screen="analytics" onclick="App.navigate('analytics')">
<div class="nav-icon">
<svg fill="none" stroke="var(--text-3)" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24">
<line x1="18" x2="18" y1="20" y2="10"></line><line x1="12" x2="12" y1="20" y2="4"></line><line x1="6" x2="6" y1="20" y2="14"></line>
</svg>
</div>
<span class="nav-label">Stats</span>
</button>
<button class="nav-item" data-screen="settings" onclick="App.navigate('settings')">
<div class="nav-icon">
<svg fill="none" stroke="var(--text-3)" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24">
<circle cx="12" cy="12" r="3"></circle>
<path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"></path>
</svg>
</div>
<span class="nav-label">Settings</span>
</button>
</nav>
</div>
<!-- Modal -->
<div id="modal-overlay" onclick="Modal.handleOverlayClick(event)">
<div id="modal">
<div class="modal-handle"></div>
<div class="modal-header">
<span class="modal-title" id="modal-title">Modal</span>
<button class="modal-close" onclick="Modal.hide()">✕</button>
</div>
<div class="modal-body" id="modal-body"></div>
<div class="modal-footer" id="modal-footer"></div>
</div>
</div>
<!-- Toast container -->
<div id="toast-container"></div>

<script defer="True" src="app.js"></script></body>
</html>
