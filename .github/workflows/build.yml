name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Install deps
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      # 🔥 FIX: create proper webDir
      - name: Prepare web files
        run: |
          mkdir www
          cp index.html www/index.html
          cp style.css www/style.css
          cp app.js www/app.js

      - name: Init Capacitor
        run: npx cap init "DSv2" "com.sanctuary.dsv2" --web-dir=www

      - name: Add Android
        run: npx cap add android

      - name: Sync
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: DSv2-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
